<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bool Tok</title>
    <link rel="icon" href="assets/img/booltok_logo.png" />

    <!-- Bootstrap Icons -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />

    <!-- TikTok Sans -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=TikTok+Sans:opsz,wght@12..36,300..900&display=swap"
      rel="stylesheet"
    />

    <!-- Stylesheet -->
    <link rel="stylesheet" href="css/style.css" />
  </head>

  <body>
    <!-- Container della pagina, necessario per via del layout particolare -->
    <div class="reel-page">
      <video src="assets/video/coder.mp4" autoplay muted loop></video>

      <!-- Header -->
      <header class="reel-header">
        <!-- Play button -->
        <button type="button" class="play" aria-label="Riproduci">
          <i class="bi bi-play-btn"></i>
        </button>

        <!-- Navigation buttons -->
        <nav aria-label="Navigazione contenuti">
          <button type="button">Esplora</button>
          <button type="button" class="new-content">Seguiti</button>
          <button type="button" class="active">Per te</button>
        </nav>

        <!-- Search button -->
        <button type="button" class="search" aria-label="Cerca">
          <i class="bi bi-search"></i>
        </button>
      </header>

      <!-- Sidebar -->
      <div class="sidebar">
        <div class="profile">
          <!-- Avatar -->
          <a href="" class="avatar-link">
            <img src="assets/img/boolean_logo.png" alt="User profile picture" />
          </a>

          <!-- Follow button -->
          <button type="button" class="follow-button" aria-label="Segui utente">
            <span class="plus">+</span>
          </button>
        </div>

        <button type="button" aria-label="Metti mi piace al video">
          <i class="bi bi-heart-fill"></i>
          <span>588</span>
        </button>

        <button type="button" aria-label="Leggi o aggiungi commenti">
          <i class="bi bi-chat-dots-fill"></i>
          <span>13</span>
        </button>

        <button type="button" aria-label="Aggiungi ai preferiti">
          <i class="bi bi-bookmark-fill"></i>
          <span>638</span>
        </button>

        <button type="button" aria-label="Condividi video">
          <i class="bi bi-sign-turn-slight-right-fill"></i>
          <span>491</span>
        </button>
      </div>

      <!-- Footer -->
      <footer>
        <!-- Bottom overlay (username and description) -->
        <div class="bottom-overlay">
          <a href="" class="username">boolean.careers</a>
          <p class="description">
            Prova il Fundamentals Camp. 20 ore di corso gratuito per...
            <button type="button" class="expand">Vedi altro</button>
          </p>
        </div>

        <!-- Footer actions -->
        <nav aria-label="Navigazione principale">
          <!-- Home button -->
          <button type="button" class="home active">
            <span class="icon-slot">
              <i class="bi bi-house-fill"></i>
            </span>
            <span class="label">Home</span>
          </button>

          <!-- Friends button -->
          <button type="button" class="friends">
            <span class="icon-slot">
              <i class="bi bi-people"></i>
            </span>
            <span class="label">Amici</span>
          </button>

          <!-- Create button -->
          <button
            type="button"
            class="create"
            aria-label="Crea nuovo contenuto"
          >
            <!-- TIP: I copied this SVG from the TikTok website with chrome dev tools, see https://www.tiktok.com/ -->
            <svg
              xmlns="http://www.w3.org/2000/svg"
              fill="none"
              viewBox="0 0 75 49"
              width="100%"
              height="100%"
            >
              <path
                fill="#D8D8D8"
                stroke="#979797"
                stroke-width="0.5"
                d="M.25.25h74.5v48.5H.25z"
                opacity="0.01"
              ></path>
              <path
                fill="#FA2D6C"
                fill-rule="evenodd"
                d="M23.5 23.3c0-4.48 0-6.72.872-8.432a8 8 0 0 1 3.496-3.496C29.58 10.5 31.82 10.5 36.3 10.5h9.9c4.48 0 6.72 0 8.432.872a8 8 0 0 1 3.496 3.496C59 16.58 59 18.82 59 23.3v2.4c0 4.48 0 6.72-.872 8.432a8 8 0 0 1-3.496 3.496c-1.711.872-3.952.872-8.432.872h-9.9c-4.48 0-6.72 0-8.432-.872a8 8 0 0 1-3.496-3.496C23.5 32.42 23.5 30.18 23.5 25.7z"
                clip-rule="evenodd"
              ></path>
              <path
                fill="#20D5EC"
                fill-rule="evenodd"
                d="M16 23.3c0-4.48 0-6.72.872-8.432a8 8 0 0 1 3.496-3.496C22.08 10.5 24.32 10.5 28.8 10.5h9.9c4.48 0 6.72 0 8.432.872a8 8 0 0 1 3.496 3.496c.872 1.711.872 3.952.872 8.432v2.4c0 4.48 0 6.72-.872 8.432a8 8 0 0 1-3.496 3.496c-1.711.872-3.952.872-8.432.872h-9.9c-4.48 0-6.72 0-8.432-.872a8 8 0 0 1-3.496-3.496C16 32.42 16 30.18 16 25.7z"
                clip-rule="evenodd"
              ></path>
              <rect
                width="36"
                height="28"
                x="19.5"
                y="10.5"
                fill="#fff"
                rx="8"
              ></rect>
              <path
                fill="#161823"
                fill-rule="evenodd"
                d="M36.5 18.25a.5.5 0 0 0-.5.5v4.75h-4.75a.5.5 0 0 0-.5.5v1.5a.5.5 0 0 0 .5.5H36v4.75a.5.5 0 0 0 .5.5H38a.5.5 0 0 0 .5-.5V26h4.75a.5.5 0 0 0 .5-.5V24a.5.5 0 0 0-.5-.5H38.5v-4.75a.5.5 0 0 0-.5-.5z"
                clip-rule="evenodd"
              ></path>
            </svg>
          </button>

          <!-- Inbox button -->
          <button type="button" class="inbox">
            <span class="icon-slot">
              <i class="bi bi-chat-square"></i>
              <sup class="notification-badge">19</sup>
            </span>
            <span class="label">Posta in arrivo</span>
          </button>

          <!-- Profile button -->
          <button type="button" class="profile">
            <span class="icon-slot">
              <i class="bi bi-person"></i>
            </span>
            <span class="label">Profilo</span>
          </button>
        </nav>
      </footer>
    </div>
  </body>
</html>
