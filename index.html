<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bool Tok</title>
    <link rel="icon" href="assets/img/booltok_logo.png" />

    <!-- Bootstrap Icons -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />

    <!-- TikTok Sans -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=TikTok+Sans:opsz,wght@12..36,300..900&display=swap"
      rel="stylesheet"
    />

    <!-- Stylesheet -->
    <link rel="stylesheet" href="css/style.css" />
  </head>

  <body>
    <!-- Container della pagina, necessario per via del layout particolare -->
    <div class="reel-page debug">
      <video src="assets/video/coder.mp4" autoplay muted loop></video>

      <!-- Header -->
      <header class="reel-header">
        <!-- Play button -->
        <button aria-label="Play">
          <i class="bi bi-play-btn"></i>
        </button>

        <!-- Navigation buttons -->
        <nav>
          <button>Esplora</button>
          <button class="new-content">Seguiti</button>
          <button class="active">Per te</button>
        </nav>

        <!-- Search button -->
        <button aria-label="Search">
          <i class="bi bi-search"></i>
        </button>
      </header>

      <!-- Sidebar -->
      <section class="sidebar">
        <div class="sidebar-item profile">
          <!-- Avatar -->
          <a href="" class="avatar-link">
            <img src="assets/img/boolean_logo.png" alt="User profile picture" />
          </a>

          <!-- Follow button -->
          <button class="follow-button" aria-label="Follow user">
            <span class="plus">+</span>
          </button>
        </div>

        <button aria-label="Like video">
          <i class="bi bi-heart-fill"></i>
          <span>588</span>
        </button>

        <button aria-label="Read or add comments">
          <i class="bi bi-chat-dots-fill"></i>
          <span>13</span>
        </button>

        <button aria-label="Add to Favorites">
          <i class="bi bi-bookmark-fill"></i>
          <span>638</span>
        </button>

        <button aria-label="Share video">
          <i class="bi bi-sign-turn-slight-right-fill"></i>
          <span>491</span>
        </button>
      </section>

      <!-- Footer -->
      <footer></footer>
    </div>
  </body>
</html>
