<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#000000" />
    <title>Bool Tok</title>
    <meta
      name="description"
      content="Interfaccia Reel TikTok realizzata con HTML e CSS"
    />
    <meta name="author" content="Emanuele Favero" />

    <!-- Favicon -->
    <link rel="icon" href="assets/img/booltok_logo.png" />

    <!-- Bootstrap Icons -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />

    <!-- TikTok Sans -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=TikTok+Sans:opsz,wght@12..36,300..900&display=swap"
      rel="stylesheet"
    />

    <!-- Stylesheet -->
    <link rel="stylesheet" href="css/style.css" />
  </head>

  <body>
    <!-- PAGE CONTAINER -->
    <div class="reel-page">
      <video
        src="assets/video/coder.mp4"
        autoplay
        muted
        loop
        playsinline
      ></video>

      <!-- HEADER -->
      <header class="reel-header">
        <!-- Play button -->
        <button type="button" class="play" aria-label="Riproduci">
          <i class="bi bi-play-btn" aria-hidden="true"></i>
        </button>

        <!-- Navigation buttons -->
        <nav aria-label="Navigazione contenuti">
          <button type="button">Esplora</button>
          <button type="button" class="new-content">Seguiti</button>
          <button type="button" class="active">Per te</button>
        </nav>

        <!-- Search button -->
        <button type="button" class="search" aria-label="Cerca">
          <i class="bi bi-search" aria-hidden="true"></i>
        </button>
      </header>

      <!-- SIDEBAR -->
      <div class="sidebar">
        <div class="profile">
          <!-- Avatar -->
          <a href="#" class="avatar-link">
            <img
              src="assets/img/boolean_logo.png"
              alt="User profile picture"
              width="40"
              height="40"
              draggable="false"
            />
          </a>

          <!-- Follow button -->
          <button type="button" class="follow-button" aria-label="Segui utente">
            <span class="plus">+</span>
          </button>
        </div>

        <button type="button" aria-label="Metti mi piace al video">
          <i class="bi bi-heart-fill" aria-hidden="true"></i>
          <span>588</span>
        </button>

        <button type="button" aria-label="Leggi o aggiungi commenti">
          <i class="bi bi-chat-dots-fill" aria-hidden="true"></i>
          <span>13</span>
        </button>

        <button type="button" aria-label="Aggiungi ai preferiti">
          <i class="bi bi-bookmark-fill" aria-hidden="true"></i>
          <span>638</span>
        </button>

        <button type="button" aria-label="Condividi video">
          <i class="bi bi-sign-turn-slight-right-fill" aria-hidden="true"></i>
          <span>491</span>
        </button>
      </div>

      <!-- FOOTER -->
      <footer>
        <!-- Bottom overlay (username and description) -->
        <div class="bottom-overlay">
          <a href="#" class="username">boolean.careers</a>
          <p class="description">
            Prova il Fundamentals Camp. 20 ore di corso gratuito per…
            <button type="button" class="expand">Vedi altro</button>
          </p>
        </div>

        <!-- Footer actions -->
        <nav aria-label="Navigazione principale">
          <!-- Home button -->
          <button type="button" class="home active">
            <span class="icon-slot">
              <i class="bi bi-house-fill" aria-hidden="true"></i>
            </span>
            <span class="label">Home</span>
          </button>

          <!-- Friends button -->
          <button type="button" class="friends">
            <span class="icon-slot">
              <i class="bi bi-people" aria-hidden="true"></i>
            </span>
            <span class="label">Amici</span>
          </button>

          <!-- Create button -->
          <button
            type="button"
            class="create"
            aria-label="Crea nuovo contenuto"
          >
            <span class="plus"
              ><i class="bi bi-plus" aria-hidden="true"></i
            ></span>
          </button>

          <!-- Inbox button -->
          <button type="button" class="inbox">
            <span class="icon-slot">
              <i class="bi bi-chat-square" aria-hidden="true"></i>
              <sup class="notification-badge">19</sup>
            </span>
            <span class="label">Posta in arrivo</span>
          </button>

          <!-- Profile button -->
          <button type="button" class="profile">
            <span class="icon-slot">
              <i class="bi bi-person" aria-hidden="true"></i>
            </span>
            <span class="label">Profilo</span>
          </button>
        </nav>
      </footer>
    </div>
  </body>
</html>
